<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline - Family Gallery</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0b1220;
        color: #e5e7eb;
      }
      .card {
        max-width: 480px;
        margin: 24px;
        padding: 24px;
        border: 1px solid #374151;
        border-radius: 14px;
        background: #111827;
      }
      h1 { margin: 0 0 8px; font-size: 24px; }
      p { margin: 0 0 10px; line-height: 1.5; color: #cbd5e1; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You are offline</h1>
      <p>Family Gallery cannot load new data right now.</p>
      <p>Reconnect to the internet and refresh to continue.</p>
    </div>
  </body>
</html>
